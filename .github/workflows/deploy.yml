# ─────────────────────────────────────────────────────────────────
# BMSS Trade — Auto-deploy to GitHub Pages on every push to main.
#
# Live URL: https://kh1emnguyen.github.io/bmss-trade/
#
# HOW TO ENABLE (one-time, already done):
#   repo → Settings → Pages → Source → GitHub Actions
# ─────────────────────────────────────────────────────────────────

name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # trigger manually from the Actions tab if needed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Fresh install — removes stale lock file from old react-scripts setup
        # so Vite's dependency tree resolves cleanly.
        run: rm -f package-lock.json && npm install

      - name: Build
        run: npm run build
        # Vite outputs to dist/. base='./' in vite.config.js ensures
        # asset paths are relative, which GitHub Pages requires.

      - uses: actions/configure-pages@v4

      - name: Upload build artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── 2. Deploy ───────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
